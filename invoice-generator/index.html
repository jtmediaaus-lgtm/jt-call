<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JT Invoice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#eef0f3;--card:#fff;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;
  --accent:#4f46e5;--accent-d:#4338ca;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#111827;color:#fff;flex-shrink:0}
.brand{font-weight:700;font-size:16px;letter-spacing:.4px}
.actions{display:flex;gap:8px}
.actions button{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}
.actions button:hover{background:rgba(255,255,255,.18)}
.actions .primary{background:var(--accent);border-color:var(--accent)}
.actions .primary:hover{background:var(--accent-d)}
.actions .primary.dirty::after{content:'';display:inline-block;width:6px;height:6px;background:#fbbf24;border-radius:50%;margin-left:8px;vertical-align:middle;box-shadow:0 0 0 0 rgba(251,191,36,.6);animation:dirtyPulse 1.6s infinite}
@keyframes dirtyPulse{0%{box-shadow:0 0 0 0 rgba(251,191,36,.55)}70%{box-shadow:0 0 0 6px rgba(251,191,36,0)}100%{box-shadow:0 0 0 0 rgba(251,191,36,0)}}
.workspace{display:grid;grid-template-columns:240px 1.05fr 1fr;flex:1;overflow:hidden}
.workspace.no-hist{grid-template-columns:1.05fr 1fr}

/* history */
.history-panel{background:#f8f9fb;border-right:1px solid var(--line);overflow-y:auto;padding:14px}
.history-panel.hidden{display:none}
.hist-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:10px}
.hist-item{border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:8px;display:flex;overflow:hidden}
.hist-item.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,70,229,.15)}
.hist-main{flex:1;padding:10px 11px;cursor:pointer}
.hist-main:hover{background:#f3f4f6}
.hist-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px}
.hist-num{font-weight:700;font-size:13px}
.hist-client{font-size:12px;color:var(--ink);margin-bottom:2px}
.hist-meta{font-size:11px;color:var(--muted)}
.hist-actions{display:flex;flex-direction:column;border-left:1px solid var(--line)}
.hist-actions button{flex:1;border:none;background:#fff;cursor:pointer;padding:0 9px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line)}
.hist-actions button:last-child{border-bottom:none}
.hist-actions button:hover{background:#f3f4f6;color:var(--ink)}
.badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:5px}
.b-draft{background:#e5e7eb;color:#4b5563}
.b-sent{background:#dbeafe;color:#1d4ed8}
.b-paid{background:#d1fae5;color:#047857}
.empty{font-size:12px;color:var(--muted);padding:8px 2px;line-height:1.5}

/* editor */
.editor{overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;background:var(--bg)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.span2{grid-column:1/-1}
label{display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
input,textarea,select{font-family:inherit;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 10px;outline:none;width:100%;text-transform:none;font-weight:400;letter-spacing:0}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
textarea{resize:vertical}
.item-row{display:grid;grid-template-columns:1fr 64px 104px 88px 30px;gap:8px;margin-bottom:8px;align-items:center}
.item-row .it-amt{font-size:13px;font-weight:600;text-align:right;color:var(--ink)}
.it-del{border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;height:34px}
.it-del:hover{background:#fee2e2;color:#dc2626;border-color:#fecaca}
.items-actions{display:flex;gap:8px;margin-top:4px}
.running-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
.running-total .amt{font-size:18px;font-weight:700;letter-spacing:-.2px;color:var(--ink);text-transform:none}
.btn-ghost{border:1px dashed var(--line);background:#fff;color:var(--accent);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.btn-ghost:hover{border-color:var(--accent);background:#f5f5ff}
.preset-select{flex:1;color:var(--accent);font-weight:600;border-style:dashed;cursor:pointer}
.hint{background:#fef9c3;border:1px solid #fde68a;color:#854d0e;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.link{background:none;border:none;color:var(--accent-d);font-weight:700;cursor:pointer;font-size:13px;padding:0;text-decoration:underline;font-family:inherit}

/* preview */
.preview{overflow-y:auto;padding:24px;background:#dde0e6}
.inv-doc{background:#fff;max-width:760px;margin:0 auto;padding:48px 52px;box-shadow:0 2px 10px rgba(0,0,0,.14);border-radius:4px;color:#000;font-family:Arial,Helvetica,sans-serif}
.doc-title{text-align:center;font-size:26px;font-weight:700;margin-bottom:6px}
.biz-block{text-align:right;font-size:12.5px;line-height:1.5;margin-bottom:26px}
.biz-block .biz-name{font-weight:700;font-size:13.5px}
.inv-to{font-size:13px;line-height:1.6;margin-bottom:34px}
.inv-no{font-size:13px;margin-bottom:8px}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:30px}
.inv-table th,.inv-table td{border:1px solid #000;padding:9px 12px;font-size:12.5px}
.inv-table th{font-weight:700;text-align:left}
.inv-table th.c,.inv-table td.c{text-align:center}
.inv-table td.desc{text-align:left}
.inv-table .totals-label{text-align:right;font-weight:700;line-height:1.7;padding:12px}
.inv-table .totals-amt{text-align:center;font-weight:700;vertical-align:top}
.pay-sec{margin-bottom:18px}
.pay-sec .sec-h{font-weight:700;font-size:14px;margin-bottom:6px}
.pay-sec .sec-b{font-size:13px;line-height:1.6}

/* modal */
.modal{display:none;position:fixed;inset:0;background:rgba(17,24,39,.55);z-index:50;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:620px;overflow:hidden}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line);font-weight:700;font-size:15px}
.modal-head .x{border:none;background:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
.modal-body{padding:20px;max-height:62vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--line);background:#f8f9fb}
.modal-foot button{padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;border:1px solid var(--line);background:#fff;color:var(--ink)}
.modal-foot .primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-foot .primary:hover{background:var(--accent-d)}
.preset-row{display:grid;grid-template-columns:1fr 110px 30px;gap:8px;margin-bottom:8px}
.client-card{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.client-name{font-weight:700;font-size:14px}
.client-tmpl{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.client-acts{display:flex;gap:6px;flex-shrink:0}
.client-acts button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;color:var(--ink)}
.client-acts button:hover{background:#f3f4f6}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .2s;z-index:60}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media print{
  body{background:#fff}
  .topbar,.history-panel,.editor,.modal,.toast{display:none!important}
  .workspace{display:block;overflow:visible}
  .app{height:auto}
  .preview{padding:0;background:#fff;overflow:visible}
  .inv-doc{box-shadow:none;margin:0;max-width:none;border-radius:0;padding:0}
  @page{margin:1.6cm}
}
@media(max-width:1100px){
  .workspace,.workspace.no-hist{grid-template-columns:1fr}
  .preview,.history-panel{display:none}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">JT INVOICE</div>
    <div class="actions">
      <a href="catalog.html" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none">Catalog</a>
      <button onclick="newInvoice()">New</button>
      <button class="primary" id="saveBtn" onclick="saveInvoice()" title="Save invoice">Save</button>
      <button onclick="window.print()">Print / PDF</button>
      <button onclick="toggleHistory()">History</button>
      <button onclick="openClients()">Clients</button>
      <button onclick="openSettings()">Settings</button>
    </div>
  </div>
  <div class="workspace" id="workspace">
    <aside class="history-panel" id="historyPanel">
      <div class="hist-title">Saved invoices</div>
      <div id="historyList"></div>
    </aside>
    <section class="editor" id="editor"></section>
    <section class="preview" id="preview"></section>
  </div>
</div>

<div class="modal" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-box">
    <div class="modal-head"><span>Settings</span><button class="x" onclick="closeSettings()" aria-label="Close">&times;</button></div>
    <div class="modal-body" id="settingsBody"></div>
    <div class="modal-foot">
      <button onclick="closeSettings()">Cancel</button>
      <button class="primary" onclick="saveSettings()">Save settings</button>
    </div>
  </div>
</div>

<div class="modal" id="clientsModal" onclick="if(event.target===this)closeClients()">
  <div class="modal-box">
    <div class="modal-head"><span>Clients &amp; their regular orders</span><button class="x" onclick="closeClients()" aria-label="Close">&times;</button></div>
    <div class="modal-body" id="clientsBody"></div>
    <div class="modal-foot">
      <button class="primary" onclick="closeClients()">Done</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const LS = {
  get:(k,d)=>{try{const v=JSON.parse(localStorage.getItem(k));return v==null?d:v;}catch(e){return d;}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => {n=Number(n)||0;return '$'+(n%1===0?String(n):n.toFixed(2));};
const today = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const fmtDate = s => {
  if(!s)return '';
  const d=new Date(s+'T00:00:00');
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
};
const nl2br = s => esc(s).replace(/\n/g,'<br>');

let business = LS.get('vinv_business',{
  name:'JT MEDIA AUS',
  abn:'71 471 928 133',
  address:'167 Pleasant grove circle\nFalcon\nWA, 6210',
  phone:'0467 542 200',
  email:'Jtmedia.aus@gmail.com'
});
let payment = LS.get('vinv_payment',{accountName:'Jack Templeman',bsb:'067873',account:'2341 1308'});
let settings = LS.get('vinv_settings',{
  docTitle:'TAX INVOICE',
  nextNumber:9,
  defaultTerms:'Payment within 14 days from the date of this invoice.'
});
let presets = LS.get('vinv_presets',[
  {description:'Instructional videos',unitPrice:125},
  {description:'Interview/talking videos',unitPrice:125},
  {description:'Cinematic/general videos',unitPrice:125}
]);
let clients = LS.get('vinv_clients',[]);
let invoices = LS.get('vinv_invoices',[]);
let current = null, isNew = true, draft = null;
let savedSnapshot = '';
function snapshotSaved(){ savedSnapshot = current ? JSON.stringify(current) : ''; }
function hasContent(inv){
  if(!inv) return false;
  if((inv.to||'').trim()) return true;
  return inv.items.some(it => (it.description||'').trim() || (it.qty && it.qty!==1) || (Number(it.unitPrice)||0)>0);
}
function isDirty(){
  if(!current) return false;
  if(isNew) return hasContent(current);
  return JSON.stringify(current) !== savedSnapshot;
}
function confirmDiscard(action){
  if(!isDirty()) return true;
  return confirm('You have unsaved changes on this invoice.\n\n' + (action||'Continue') + '?');
}
function refreshDirty(){
  const btn = $('saveBtn');
  if(btn) btn.classList.toggle('dirty', isDirty());
}

function blankInvoice(){
  return {
    id:Date.now(),
    number:String(settings.nextNumber).padStart(3,'0'),
    date:today(),
    status:'Draft',
    to:'',
    clientId:null,
    items:[{description:'',qty:1,unitPrice:0}],
    terms:settings.defaultTerms
  };
}
function invoiceTotal(inv){
  inv = inv||current;
  return inv.items.reduce((s,it)=>s+((it.qty||0)*(it.unitPrice||0)),0);
}

/* ---- actions ---- */
function newInvoice(){
  if(!confirmDiscard('Start a new invoice anyway')) return;
  current=blankInvoice();isNew=true;snapshotSaved();renderAll();flash('New invoice');
}
function saveInvoice(){
  if(!current)return;
  if(isNew){
    invoices.unshift(current);
    isNew=false;
    const num=parseInt(String(current.number).replace(/\D/g,''),10);
    if(!isNaN(num)&&num>=settings.nextNumber){settings.nextNumber=num+1;LS.set('vinv_settings',settings);}
  }else{
    const i=invoices.findIndex(x=>x.id===current.id);
    if(i>=0)invoices[i]=current;else invoices.unshift(current);
  }
  LS.set('vinv_invoices',invoices);
  snapshotSaved();
  renderHistory();
  flash('Saved');
}
function loadInvoice(id){
  if(!confirmDiscard('Load another invoice anyway')) return;
  const inv=invoices.find(x=>x.id===id);if(!inv)return;
  current=JSON.parse(JSON.stringify(inv));isNew=false;snapshotSaved();renderAll();
}
function duplicateInvoice(id){
  if(!confirmDiscard('Duplicate anyway')) return;
  const src=invoices.find(x=>x.id===id);if(!src)return;
  current=JSON.parse(JSON.stringify(src));
  current.id=Date.now();
  current.number=String(settings.nextNumber).padStart(3,'0');
  current.date=today();
  current.status='Draft';
  isNew=true;renderAll();flash('Duplicated — save to keep it');
}
function deleteInvoice(id){
  if(!confirm('Delete this invoice? This cannot be undone.'))return;
  invoices=invoices.filter(x=>x.id!==id);
  LS.set('vinv_invoices',invoices);
  if(current&&current.id===id){
    current=blankInvoice();isNew=true;snapshotSaved();renderAll();
  }else renderHistory();
}
function markPaid(id){
  const inv=invoices.find(x=>x.id===id);if(!inv)return;
  inv.status='Paid';
  if(current&&current.id===id)current.status='Paid';
  LS.set('vinv_invoices',invoices);
  renderHistory();
  if(current&&current.id===id)renderEditor();
}
function toggleHistory(){
  $('historyPanel').classList.toggle('hidden');
  $('workspace').classList.toggle('no-hist');
}

/* ---- clients (per-client "regular order" templates) ---- */
function pickClient(id){
  if(!id){current.clientId=null;renderEditor();renderPreview();return;}
  const cl=clients.find(x=>String(x.id)===String(id));
  if(!cl)return;
  current.clientId=cl.id;
  current.to=cl.name;
  const hasItems=current.items.some(it=>it.description||it.unitPrice);
  if(cl.template&&cl.template.length){
    if(!hasItems||confirm('Load '+cl.name+'’s regular order? This replaces the current line items.')){
      current.items=cl.template.map(it=>Object.assign({},it));
    }
  }
  renderEditor();renderPreview();
}
function saveClientTemplate(){
  const items=current.items.filter(it=>it.description.trim()!=='');
  if(!items.length){alert('Add some line items first.');return;}
  if(current.clientId){
    const cl=clients.find(x=>x.id===current.clientId);
    if(cl){cl.name=current.to||cl.name;cl.template=items.map(it=>Object.assign({},it));}
  }else{
    const name=(current.to||'').trim();
    if(!name){alert('Enter the client name in the "To" field first.');return;}
    const cl={id:Date.now(),name:name,template:items.map(it=>Object.assign({},it))};
    clients.push(cl);
    current.clientId=cl.id;
  }
  LS.set('vinv_clients',clients);
  renderEditor();
  flash('Client order saved');
}
function openClients(){renderClients();$('clientsModal').classList.add('open');}
function closeClients(){$('clientsModal').classList.remove('open');}
function useClient(id){closeClients();pickClient(id);}
function deleteClient(id){
  if(!confirm('Delete this client and their saved order?'))return;
  clients=clients.filter(x=>x.id!==id);
  LS.set('vinv_clients',clients);
  if(current&&current.clientId===id){current.clientId=null;renderEditor();}
  renderClients();
}
function renderClients(){
  const body=$('clientsBody');
  if(!clients.length){
    body.innerHTML='<div class="empty">No saved clients yet. Build a set of line items for a client, then use the "Save line items as a client order" button in the Bill to section. Next time you invoice them, pick them from the Client dropdown and the line items fill in automatically.</div>';
    return;
  }
  body.innerHTML=clients.map(cl=>{
    const total=cl.template.reduce((s,it)=>s+((it.qty||0)*(it.unitPrice||0)),0);
    const summary=cl.template.map(it=>`${it.qty}× ${esc(it.description)}`).join(', ');
    return `<div class="client-card">
      <div class="client-info">
        <div class="client-name">${esc(cl.name)}</div>
        <div class="client-tmpl">${summary||'No items'} &middot; ${fmt(total)}</div>
      </div>
      <div class="client-acts">
        <button onclick="useClient(${cl.id})">Use</button>
        <button onclick="deleteClient(${cl.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

/* ---- line items ---- */
function refreshLine(i){
  const it=current.items[i],el=$('lineamt'+i);
  if(el)el.textContent=fmt((it.qty||0)*(it.unitPrice||0));
  refreshRunningTotal();
}
function refreshRunningTotal(){
  const el=$('runningTotal');
  if(el)el.textContent=fmt(invoiceTotal());
}
function addItem(){current.items.push({description:'',qty:1,unitPrice:0});renderItems();renderPreview();}
function removeItem(i){
  current.items.splice(i,1);
  if(!current.items.length)current.items.push({description:'',qty:1,unitPrice:0});
  renderItems();renderPreview();
}
function addPreset(i){
  if(i==='')return;
  const p=presets[i];if(!p)return;
  current.items.push({description:p.description,qty:1,unitPrice:p.unitPrice});
  renderItems();renderPreview();
}

/* ---- render ---- */
function renderAll(){renderEditor();renderPreview();renderHistory();refreshDirty();}

function renderEditor(){
  const c=current;
  $('editor').innerHTML=`
    <div class="card">
      <div class="card-title">Invoice details</div>
      <div class="grid2">
        <label>Invoice number<input value="${esc(c.number)}" oninput="current.number=this.value;renderPreview()"></label>
        <label>Status<select onchange="current.status=this.value;renderHistory()">
          ${['Draft','Sent','Paid'].map(s=>`<option ${c.status===s?'selected':''}>${s}</option>`).join('')}
        </select></label>
        <label class="span2">Invoice date<input type="date" value="${c.date}" oninput="current.date=this.value;renderPreview()"></label>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Bill to</div>
      <div class="grid2">
        <label>Client<select onchange="pickClient(this.value)">
          <option value="">— New / one-off client —</option>
          ${clients.map(cl=>`<option value="${cl.id}" ${c.clientId===cl.id?'selected':''}>${esc(cl.name)}</option>`).join('')}
        </select></label>
        <label>To (name on invoice)<input value="${esc(c.to)}" oninput="current.to=this.value;renderPreview()" placeholder="e.g. Mandurah Combat Sports Academy"></label>
      </div>
      <button class="btn-ghost" style="margin-top:10px" onclick="saveClientTemplate()">${c.clientId?'Update this client&rsquo;s regular order':'Save line items as a client&rsquo;s regular order'}</button>
    </div>
    <div class="card">
      <div class="card-title">Line items</div>
      <div class="item-row" style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">
        <span>Description</span><span>Qty</span><span>Unit price</span><span style="text-align:right">Amount</span><span></span>
      </div>
      <div id="itemsBox"></div>
      <div class="items-actions">
        <button class="btn-ghost" onclick="addItem()">+ Add line</button>
        <select class="preset-select" onchange="addPreset(this.value);this.value=''">
          <option value="">+ Add from saved services…</option>
          ${presets.map((p,i)=>`<option value="${i}">${esc(p.description)} — ${fmt(p.unitPrice)}</option>`).join('')}
        </select>
      </div>
      <div class="running-total"><span>Running total</span><span class="amt" id="runningTotal">${fmt(invoiceTotal())}</span></div>
    </div>
    <div class="card">
      <div class="card-title">Payment terms</div>
      <label>Terms text (appears on the invoice)<textarea rows="2" oninput="current.terms=this.value;renderPreview()">${esc(c.terms)}</textarea></label>
    </div>`;
  renderItems();
}

function renderItems(){
  $('itemsBox').innerHTML=current.items.map((it,i)=>`
    <div class="item-row">
      <input placeholder="Description of work" value="${esc(it.description)}" oninput="current.items[${i}].description=this.value;renderPreview()">
      <input type="number" min="0" step="1" value="${it.qty}" oninput="current.items[${i}].qty=parseFloat(this.value)||0;refreshLine(${i});renderPreview()">
      <input type="number" min="0" step="0.01" value="${it.unitPrice}" oninput="current.items[${i}].unitPrice=parseFloat(this.value)||0;refreshLine(${i});renderPreview()">
      <span class="it-amt" id="lineamt${i}">${fmt((it.qty||0)*(it.unitPrice||0))}</span>
      <button class="it-del" onclick="removeItem(${i})" title="Remove line">&times;</button>
    </div>`).join('');
}

function renderPreview(){
  const c=current,b=business,p=payment,total=invoiceTotal();
  const items=c.items.filter(it=>it.description||it.qty||it.unitPrice);
  $('preview').innerHTML=`
    <div class="inv-doc">
      <div class="doc-title">${esc(settings.docTitle)}</div>
      <div class="biz-block">
        <div class="biz-name">${esc(b.name)}</div>
        ${b.abn?`ABN: ${esc(b.abn)}<br>`:''}
        ${b.address?nl2br(b.address)+'<br>':''}
        ${b.phone?esc(b.phone)+'<br>':''}
        ${b.email?esc(b.email):''}
      </div>
      <div class="inv-to">
        ${fmtDate(c.date)}<br>
        To: ${esc(c.to)||'&nbsp;'}
      </div>
      <div class="inv-no">Invoice &nbsp;${esc(c.number)}</div>
      <table class="inv-table">
        <thead>
          <tr><th>Item description</th><th class="c">Quantity</th><th class="c">Unit Price</th><th class="c">Amount</th></tr>
        </thead>
        <tbody>
          ${items.length?items.map(it=>`<tr>
            <td class="desc">${esc(it.description)}</td>
            <td class="c">${it.qty||0}</td>
            <td class="c">${fmt(it.unitPrice)}</td>
            <td class="c">${fmt((it.qty||0)*(it.unitPrice||0))}</td>
          </tr>`).join(''):`<tr><td class="desc" colspan="4" style="color:#999">No line items yet</td></tr>`}
          <tr>
            <td class="totals-label" colspan="3">Total amount payable<br>No GST has been charged</td>
            <td class="totals-amt">${fmt(total)}</td>
          </tr>
        </tbody>
      </table>
      <div class="pay-sec">
        <div class="sec-h">Payment details</div>
        <div class="sec-b">Pay by bank transfer to:<br>
          Name: ${esc(p.accountName)}<br>
          BSB: ${esc(p.bsb)}<br>
          Acc #: ${esc(p.account)}</div>
      </div>
      ${c.terms?`<div class="pay-sec">
        <div class="sec-h">Payment terms</div>
        <div class="sec-b">${nl2br(c.terms)}</div>
      </div>`:''}
    </div>`;
}

function renderHistory(){
  const box=$('historyList');
  if(!invoices.length){box.innerHTML='<div class="empty">No saved invoices yet. Fill one in and hit Save.</div>';return;}
  box.innerHTML=invoices.map(inv=>`
    <div class="hist-item ${current&&current.id===inv.id?'active':''}">
      <div class="hist-main" onclick="loadInvoice(${inv.id})">
        <div class="hist-top"><span class="hist-num">Invoice ${esc(inv.number)}</span><span class="badge b-${esc(inv.status.toLowerCase())}">${esc(inv.status)}</span></div>
        <div class="hist-client">${esc(inv.to)||'No client'}</div>
        <div class="hist-meta">${fmtDate(inv.date)} &middot; ${fmt(invoiceTotal(inv))}</div>
      </div>
      <div class="hist-actions">
        ${inv.status!=='Paid'?`<button onclick="markPaid(${inv.id})" title="Mark paid">&#10003;</button>`:''}
        <button onclick="duplicateInvoice(${inv.id})" title="Duplicate">&#8862;</button>
        <button onclick="deleteInvoice(${inv.id})" title="Delete">&#128465;</button>
      </div>
    </div>`).join('');
}

/* ---- settings ---- */
function openSettings(){
  draft={
    business:Object.assign({},business),
    payment:Object.assign({},payment),
    settings:Object.assign({},settings),
    presets:presets.map(p=>Object.assign({},p))
  };
  renderSettings();
  $('settingsModal').classList.add('open');
}
function closeSettings(){$('settingsModal').classList.remove('open');draft=null;}
function saveSettings(){
  business=draft.business;LS.set('vinv_business',business);
  payment=draft.payment;LS.set('vinv_payment',payment);
  settings=draft.settings;LS.set('vinv_settings',settings);
  presets=draft.presets.filter(p=>p.description.trim()!=='');LS.set('vinv_presets',presets);
  closeSettings();
  renderEditor();renderPreview();
  flash('Settings saved');
}
function renderSettings(){
  const d=draft;
  $('settingsBody').innerHTML=`
    <div class="card-title">Your business</div>
    <div class="grid2">
      <label>Business name<input value="${esc(d.business.name)}" oninput="draft.business.name=this.value"></label>
      <label>ABN<input value="${esc(d.business.abn)}" oninput="draft.business.abn=this.value"></label>
      <label>Phone<input value="${esc(d.business.phone)}" oninput="draft.business.phone=this.value"></label>
      <label>Email<input value="${esc(d.business.email)}" oninput="draft.business.email=this.value"></label>
      <label class="span2">Address<textarea rows="3" oninput="draft.business.address=this.value">${esc(d.business.address)}</textarea></label>
    </div>
    <div class="card-title" style="margin-top:8px">Payment details</div>
    <div class="grid2">
      <label>Account name<input value="${esc(d.payment.accountName)}" oninput="draft.payment.accountName=this.value"></label>
      <label>BSB<input value="${esc(d.payment.bsb)}" oninput="draft.payment.bsb=this.value"></label>
      <label class="span2">Account number<input value="${esc(d.payment.account)}" oninput="draft.payment.account=this.value"></label>
    </div>
    <div class="card-title" style="margin-top:8px">Defaults</div>
    <div class="grid2">
      <label>Document title<input value="${esc(d.settings.docTitle)}" oninput="draft.settings.docTitle=this.value"></label>
      <label>Next invoice number<input type="number" min="1" value="${d.settings.nextNumber}" oninput="draft.settings.nextNumber=parseInt(this.value)||1"></label>
      <label class="span2">Default payment terms<textarea rows="2" oninput="draft.settings.defaultTerms=this.value">${esc(d.settings.defaultTerms)}</textarea></label>
    </div>
    <div class="card-title" style="margin-top:8px">Saved services <span style="text-transform:none;font-weight:400">— quick-add presets for line items</span></div>
    <div id="presetEdit">${d.presets.map((p,i)=>`
      <div class="preset-row">
        <input placeholder="Service description" value="${esc(p.description)}" oninput="draft.presets[${i}].description=this.value">
        <input type="number" min="0" step="0.01" value="${p.unitPrice}" oninput="draft.presets[${i}].unitPrice=parseFloat(this.value)||0">
        <button class="it-del" onclick="draft.presets.splice(${i},1);renderSettings()" title="Remove">&times;</button>
      </div>`).join('')}</div>
    <button class="btn-ghost" onclick="draft.presets.push({description:'',unitPrice:0});renderSettings()">+ Add service</button>
    <div class="card-title" style="margin-top:18px">Backup &amp; restore</div>
    <div style="font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:10px">Your invoices, clients, presets, and settings live in this browser only. Export a backup file regularly — or before clearing browser data, switching devices, or trying another browser.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-ghost" onclick="exportBackup()">Download backup (.json)</button>
      <button class="btn-ghost" onclick="importBackup()">Restore from backup…</button>
    </div>`;
}

const BACKUP_KEYS = ['vinv_business','vinv_payment','vinv_settings','vinv_presets','vinv_clients','vinv_invoices'];
function exportBackup(){
  const data = {};
  for(const k of BACKUP_KEYS){
    const v = localStorage.getItem(k);
    if(v!==null){ try{ data[k] = JSON.parse(v); }catch(_){} }
  }
  const payload = {app:'JT Invoice', version:1, exportedAt:new Date().toISOString(), data};
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'jt-invoice-backup-' + today() + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  flash('Backup downloaded');
}
function importBackup(){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json,application/json';
  inp.onchange = e => {
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ev => {
      let parsed;
      try{ parsed = JSON.parse(ev.target.result); }
      catch(err){ alert('Not a valid JSON file.'); return; }
      const data = (parsed && parsed.data) ? parsed.data : parsed;
      if(!data || typeof data!=='object'){ alert('Backup file is missing the data block.'); return; }
      const keysFound = BACKUP_KEYS.filter(k=>k in data);
      if(!keysFound.length){ alert('No JT Invoice data found in this file.'); return; }
      if(!confirm('Restore ' + keysFound.length + ' data section(s)? This REPLACES the current invoices, clients, presets, and settings in this browser.')) return;
      for(const k of keysFound){
        try{ localStorage.setItem(k, JSON.stringify(data[k])); }catch(_){}
      }
      flash('Backup restored — reloading…');
      setTimeout(()=>location.reload(), 600);
    };
    r.readAsText(f);
  };
  inp.click();
}

function flash(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);
}

document.addEventListener('keydown', e => {
  if(e.key !== 'Escape') return;
  if($('settingsModal').classList.contains('open')) closeSettings();
  else if($('clientsModal').classList.contains('open')) closeClients();
});

document.addEventListener('input', e => {
  if(e.target && e.target.closest && e.target.closest('#editor')) refreshDirty();
});

/* ---- init ---- */
current=blankInvoice();isNew=true;
try{
  const params = new URLSearchParams(location.search);
  if(params.get('seed')){
    const raw = sessionStorage.getItem('vinv_seed');
    if(raw){
      const seed = JSON.parse(raw);
      if(seed.to) current.to = seed.to;
      if(Array.isArray(seed.items) && seed.items.length){
        current.items = seed.items.map(it=>({description:it.description||'',qty:Number(it.qty)||1,unitPrice:Number(it.unitPrice)||0}));
      }
      sessionStorage.removeItem('vinv_seed');
      history.replaceState({}, '', location.pathname);
    }
  }
}catch(e){}
renderAll();
</script>
