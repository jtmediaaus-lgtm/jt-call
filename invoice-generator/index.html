<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#eef0f3;--card:#fff;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;
  --accent:#4f46e5;--accent-d:#4338ca;--ok:#059669;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#111827;color:#fff;flex-shrink:0}
.brand{font-weight:700;font-size:16px;letter-spacing:.4px}
.actions{display:flex;gap:8px}
.actions button{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}
.actions button:hover{background:rgba(255,255,255,.18)}
.actions .primary{background:var(--accent);border-color:var(--accent)}
.actions .primary:hover{background:var(--accent-d)}
.workspace{display:grid;grid-template-columns:240px 1.05fr 1fr;flex:1;overflow:hidden}
.workspace.no-hist{grid-template-columns:1.05fr 1fr}

/* history */
.history-panel{background:#f8f9fb;border-right:1px solid var(--line);overflow-y:auto;padding:14px}
.history-panel.hidden{display:none}
.hist-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:10px}
.hist-item{border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:8px;display:flex;overflow:hidden}
.hist-item.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,70,229,.15)}
.hist-main{flex:1;padding:10px 11px;cursor:pointer}
.hist-main:hover{background:#f3f4f6}
.hist-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px}
.hist-num{font-weight:700;font-size:13px}
.hist-client{font-size:12px;color:var(--ink);margin-bottom:2px}
.hist-meta{font-size:11px;color:var(--muted)}
.hist-actions{display:flex;flex-direction:column;border-left:1px solid var(--line)}
.hist-actions button{flex:1;border:none;background:#fff;cursor:pointer;padding:0 9px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line)}
.hist-actions button:last-child{border-bottom:none}
.hist-actions button:hover{background:#f3f4f6;color:var(--ink)}
.badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:5px}
.b-draft{background:#e5e7eb;color:#4b5563}
.b-sent{background:#dbeafe;color:#1d4ed8}
.b-paid{background:#d1fae5;color:#047857}
.empty{font-size:12px;color:var(--muted);padding:8px 2px;line-height:1.5}

/* editor */
.editor{overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;background:var(--bg)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.span2{grid-column:1/-1}
label{display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
input,textarea,select{font-family:inherit;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 10px;outline:none;width:100%;text-transform:none;font-weight:400;letter-spacing:0}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
textarea{resize:vertical}
.item-row{display:grid;grid-template-columns:1fr 64px 104px 88px 30px;gap:8px;margin-bottom:8px;align-items:center}
.item-row .it-amt{font-size:13px;font-weight:600;text-align:right;color:var(--ink)}
.it-del{border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;height:34px}
.it-del:hover{background:#fee2e2;color:#dc2626;border-color:#fecaca}
.items-actions{display:flex;gap:8px;margin-top:4px}
.btn-ghost{border:1px dashed var(--line);background:#fff;color:var(--accent);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.btn-ghost:hover{border-color:var(--accent);background:#f5f5ff}
.preset-select{flex:1;color:var(--accent);font-weight:600;border-style:dashed;cursor:pointer}
.hint{background:#fef9c3;border:1px solid #fde68a;color:#854d0e;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.link{background:none;border:none;color:var(--accent-d);font-weight:700;cursor:pointer;font-size:13px;padding:0;text-decoration:underline;font-family:inherit}

/* preview */
.preview{overflow-y:auto;padding:24px;background:#dde0e6}
.inv-doc{background:#fff;max-width:720px;margin:0 auto;padding:46px 44px;box-shadow:0 2px 10px rgba(0,0,0,.14);border-radius:4px;color:#111827}
.inv-head{display:flex;justify-content:space-between;gap:24px;margin-bottom:30px}
.inv-logo{max-height:64px;max-width:220px;margin-bottom:8px;display:block}
.inv-bizname{font-size:22px;font-weight:800;letter-spacing:.3px}
.inv-bizname-sm{font-size:13px;font-weight:700;margin-bottom:4px}
.inv-from-meta{font-size:12px;color:#6b7280;line-height:1.6;margin-top:6px}
.inv-title-block{text-align:right;flex-shrink:0}
.inv-title{font-size:30px;font-weight:800;letter-spacing:2px;color:#111827;margin-bottom:10px}
.inv-meta{font-size:12px;border-collapse:collapse;margin-left:auto}
.inv-meta td{padding:2px 0 2px 16px;text-align:right}
.inv-meta td:first-child{color:#6b7280;text-transform:uppercase;font-size:10px;letter-spacing:.6px;font-weight:700}
.inv-billto{margin-bottom:24px}
.inv-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:#6b7280;font-weight:700;margin-bottom:5px}
.inv-client-name{font-size:15px;font-weight:700}
.inv-muted{font-size:12px;color:#6b7280;line-height:1.6;margin-top:2px}
.inv-items{width:100%;border-collapse:collapse;margin-bottom:18px}
.inv-items th{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#6b7280;font-weight:700;text-align:left;padding:8px 10px;border-bottom:2px solid #111827}
.inv-items th.num,.inv-items td.num{text-align:right}
.inv-items td{font-size:13px;padding:10px;border-bottom:1px solid #e5e7eb;vertical-align:top}
.inv-totals{margin-left:auto;width:260px;margin-bottom:26px}
.inv-trow{display:flex;justify-content:space-between;font-size:13px;padding:6px 10px}
.inv-trow.inv-due{border-top:2px solid #111827;font-size:16px;font-weight:800;padding-top:10px;margin-top:4px}
.inv-pay{background:#f8f9fb;border:1px solid #e5e7eb;border-radius:8px;padding:14px 16px;margin-bottom:18px}
.inv-pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;font-size:12px}
.inv-pay-grid div span{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;font-weight:700}
.inv-notes{font-size:12px;color:#6b7280;line-height:1.6;border-top:1px solid #e5e7eb;padding-top:14px}

/* modal */
.modal{display:none;position:fixed;inset:0;background:rgba(17,24,39,.55);z-index:50;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:620px;overflow:hidden}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line);font-weight:700;font-size:15px}
.modal-head .x{border:none;background:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
.modal-body{padding:20px;max-height:62vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--line);background:#f8f9fb}
.modal-foot button{padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;border:1px solid var(--line);background:#fff;color:var(--ink)}
.modal-foot .primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-foot .primary:hover{background:var(--accent-d)}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-prev{width:120px;height:54px;border:1px dashed var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;background:#f8f9fb;overflow:hidden;flex-shrink:0}
.logo-prev img{max-width:100%;max-height:100%}
.logo-prev span{font-size:11px;color:#9ca3af}
.preset-row{display:grid;grid-template-columns:1fr 110px 30px;gap:8px;margin-bottom:8px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .2s;z-index:60}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media print{
  body{background:#fff}
  .topbar,.history-panel,.editor,.modal,.toast{display:none!important}
  .workspace{display:block;overflow:visible}
  .app{height:auto}
  .preview{padding:0;background:#fff;overflow:visible}
  .inv-doc{box-shadow:none;margin:0;max-width:none;border-radius:0;padding:0}
  @page{margin:1.4cm}
}
@media(max-width:1100px){
  .workspace,.workspace.no-hist{grid-template-columns:1fr}
  .preview{display:none}
  .history-panel{display:none}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">INVOICES</div>
    <div class="actions">
      <button onclick="newInvoice()">New</button>
      <button class="primary" onclick="saveInvoice()">Save</button>
      <button onclick="window.print()">Print / PDF</button>
      <button onclick="toggleHistory()">History</button>
      <button onclick="openSettings()">Settings</button>
    </div>
  </div>
  <div class="workspace" id="workspace">
    <aside class="history-panel" id="historyPanel">
      <div class="hist-title">Saved invoices</div>
      <div id="historyList"></div>
    </aside>
    <section class="editor" id="editor"></section>
    <section class="preview" id="preview"></section>
  </div>
</div>

<div class="modal" id="settingsModal">
  <div class="modal-box">
    <div class="modal-head"><span>Settings</span><button class="x" onclick="closeSettings()">&times;</button></div>
    <div class="modal-body" id="settingsBody"></div>
    <div class="modal-foot">
      <button onclick="closeSettings()">Cancel</button>
      <button class="primary" onclick="saveSettings()">Save settings</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const LS = {
  get:(k,d)=>{try{const v=JSON.parse(localStorage.getItem(k));return v==null?d:v;}catch(e){return d;}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => '$'+(Number(n)||0).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});
const today = () => new Date().toISOString().slice(0,10);
const addDays = (d,n)=>{const x=new Date(d+'T00:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);};
const fmtDate = s => s?new Date(s+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}):'';
const nl2br = s => esc(s).replace(/\n/g,'<br>');

let business = LS.get('vinv_business',{name:'',abn:'',email:'',phone:'',address:'',logo:''});
let payment  = LS.get('vinv_payment',{accountName:'',bank:'',bsb:'',account:''});
let settings = LS.get('vinv_settings',{prefix:'INV-',nextNumber:1,dueDays:14,defaultNotes:'Payment due within 14 days of the invoice date. Thank you for your business.'});
let presets  = LS.get('vinv_presets',[
  {description:'Wedding videography — full day coverage',unitPrice:2200},
  {description:'Highlight film (3–5 min edit)',unitPrice:650},
  {description:'Event coverage — half day (up to 4 hrs)',unitPrice:850},
  {description:'Promotional / brand video',unitPrice:1500},
  {description:'Second shooter / additional camera operator',unitPrice:450},
  {description:'Drone aerial footage',unitPrice:350},
  {description:'Raw footage delivery',unitPrice:150},
  {description:'Travel fee',unitPrice:0}
]);
let invoices = LS.get('vinv_invoices',[]);
let current = null, isNew = true, draft = null;

function blankInvoice(){
  return {
    id:Date.now(),
    number:settings.prefix+String(settings.nextNumber).padStart(4,'0'),
    issueDate:today(),
    dueDate:addDays(today(),settings.dueDays),
    status:'Draft',
    client:{name:'',business:'',email:'',address:''},
    items:[{description:'',qty:1,unitPrice:0}],
    depositPaid:0,
    notes:settings.defaultNotes
  };
}
function totals(inv){
  inv = inv||current;
  const subtotal = inv.items.reduce((s,it)=>s+((it.qty||0)*(it.unitPrice||0)),0);
  const deposit = inv.depositPaid||0;
  return {subtotal,deposit,balance:subtotal-deposit};
}

/* ---- actions ---- */
function newInvoice(){current=blankInvoice();isNew=true;renderAll();flash('New invoice');}
function saveInvoice(){
  if(!current)return;
  if(isNew){
    invoices.unshift(current);
    isNew=false;
    const num=parseInt(String(current.number).replace(/\D/g,''),10);
    if(!isNaN(num)&&num>=settings.nextNumber){settings.nextNumber=num+1;LS.set('vinv_settings',settings);}
  }else{
    const i=invoices.findIndex(x=>x.id===current.id);
    if(i>=0)invoices[i]=current;else invoices.unshift(current);
  }
  LS.set('vinv_invoices',invoices);
  renderHistory();
  flash('Saved');
}
function loadInvoice(id){
  const inv=invoices.find(x=>x.id===id);if(!inv)return;
  current=JSON.parse(JSON.stringify(inv));isNew=false;renderAll();
}
function duplicateInvoice(id){
  const src=invoices.find(x=>x.id===id);if(!src)return;
  current=JSON.parse(JSON.stringify(src));
  current.id=Date.now();
  current.number=settings.prefix+String(settings.nextNumber).padStart(4,'0');
  current.issueDate=today();
  current.dueDate=addDays(today(),settings.dueDays);
  current.status='Draft';
  isNew=true;renderAll();flash('Duplicated — save to keep it');
}
function deleteInvoice(id){
  if(!confirm('Delete this invoice? This cannot be undone.'))return;
  invoices=invoices.filter(x=>x.id!==id);
  LS.set('vinv_invoices',invoices);
  if(current&&current.id===id)newInvoice();else renderHistory();
}
function markPaid(id){
  const inv=invoices.find(x=>x.id===id);if(!inv)return;
  inv.status='Paid';
  if(current&&current.id===id)current.status='Paid';
  LS.set('vinv_invoices',invoices);
  renderHistory();
  if(current&&current.id===id)renderEditor();
}
function toggleHistory(){
  $('historyPanel').classList.toggle('hidden');
  $('workspace').classList.toggle('no-hist');
}

/* ---- line items ---- */
function refreshLine(i){
  const it=current.items[i],el=$('lineamt'+i);
  if(el)el.textContent=fmt((it.qty||0)*(it.unitPrice||0));
}
function addItem(){current.items.push({description:'',qty:1,unitPrice:0});renderItems();renderPreview();}
function removeItem(i){
  current.items.splice(i,1);
  if(!current.items.length)current.items.push({description:'',qty:1,unitPrice:0});
  renderItems();renderPreview();
}
function addPreset(i){
  if(i==='')return;
  const p=presets[i];if(!p)return;
  current.items.push({description:p.description,qty:1,unitPrice:p.unitPrice});
  renderItems();renderPreview();
}

/* ---- render ---- */
function renderAll(){renderEditor();renderPreview();renderHistory();}

function renderEditor(){
  const c=current;
  $('editor').innerHTML=`
    ${!business.name?`<div class="hint">Add your business name, contact and bank details in <button class="link" onclick="openSettings()">Settings</button> — they appear on every invoice.</div>`:''}
    <div class="card">
      <div class="card-title">Invoice details</div>
      <div class="grid2">
        <label>Invoice number<input value="${esc(c.number)}" oninput="current.number=this.value;renderPreview()"></label>
        <label>Status<select onchange="current.status=this.value;renderHistory()">
          ${['Draft','Sent','Paid'].map(s=>`<option ${c.status===s?'selected':''}>${s}</option>`).join('')}
        </select></label>
        <label>Issue date<input type="date" value="${c.issueDate}" oninput="current.issueDate=this.value;renderPreview()"></label>
        <label>Due date<input type="date" value="${c.dueDate}" oninput="current.dueDate=this.value;renderPreview()"></label>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Bill to</div>
      <div class="grid2">
        <label>Client / contact name<input value="${esc(c.client.name)}" oninput="current.client.name=this.value;renderPreview()"></label>
        <label>Business name<input value="${esc(c.client.business)}" oninput="current.client.business=this.value;renderPreview()"></label>
        <label class="span2">Email<input value="${esc(c.client.email)}" oninput="current.client.email=this.value;renderPreview()"></label>
        <label class="span2">Address<textarea rows="2" oninput="current.client.address=this.value;renderPreview()">${esc(c.client.address)}</textarea></label>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Line items</div>
      <div id="itemsBox"></div>
      <div class="items-actions">
        <button class="btn-ghost" onclick="addItem()">+ Add line</button>
        <select class="preset-select" onchange="addPreset(this.value);this.value=''">
          <option value="">+ Add from saved services…</option>
          ${presets.map((p,i)=>`<option value="${i}">${esc(p.description)} — ${fmt(p.unitPrice)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Summary</div>
      <div class="grid2">
        <label>Deposit already paid (optional)<input type="number" min="0" step="0.01" value="${c.depositPaid||''}" placeholder="0.00" oninput="current.depositPaid=parseFloat(this.value)||0;renderPreview()"></label>
      </div>
      <label class="span2" style="margin-top:12px">Notes / payment terms<textarea rows="3" oninput="current.notes=this.value;renderPreview()">${esc(c.notes)}</textarea></label>
    </div>`;
  renderItems();
}

function renderItems(){
  $('itemsBox').innerHTML=current.items.map((it,i)=>`
    <div class="item-row">
      <input placeholder="Description of work" value="${esc(it.description)}" oninput="current.items[${i}].description=this.value;renderPreview()">
      <input type="number" min="0" step="1" value="${it.qty}" oninput="current.items[${i}].qty=parseFloat(this.value)||0;refreshLine(${i});renderPreview()">
      <input type="number" min="0" step="0.01" value="${it.unitPrice}" oninput="current.items[${i}].unitPrice=parseFloat(this.value)||0;refreshLine(${i});renderPreview()">
      <span class="it-amt" id="lineamt${i}">${fmt((it.qty||0)*(it.unitPrice||0))}</span>
      <button class="it-del" onclick="removeItem(${i})" title="Remove line">&times;</button>
    </div>`).join('');
}

function renderPreview(){
  const c=current,t=totals(),b=business,p=payment;
  const items=c.items.filter(it=>it.description||it.qty||it.unitPrice);
  $('preview').innerHTML=`
    <div class="inv-doc">
      <div class="inv-head">
        <div class="inv-from">
          ${b.logo?`<img class="inv-logo" src="${b.logo}" alt="">`:''}
          ${b.logo?(b.name?`<div class="inv-bizname-sm">${esc(b.name)}</div>`:''):`<div class="inv-bizname">${esc(b.name)||'Your Business'}</div>`}
          <div class="inv-from-meta">
            ${b.abn?`ABN ${esc(b.abn)}<br>`:''}
            ${b.address?nl2br(b.address)+'<br>':''}
            ${b.email?esc(b.email)+'<br>':''}
            ${b.phone?esc(b.phone):''}
          </div>
        </div>
        <div class="inv-title-block">
          <div class="inv-title">INVOICE</div>
          <table class="inv-meta">
            <tr><td>Invoice #</td><td>${esc(c.number)}</td></tr>
            <tr><td>Issued</td><td>${fmtDate(c.issueDate)}</td></tr>
            <tr><td>Due</td><td>${fmtDate(c.dueDate)}</td></tr>
          </table>
        </div>
      </div>
      <div class="inv-billto">
        <div class="inv-label">Bill to</div>
        <div class="inv-client-name">${esc(c.client.business||c.client.name)||'Client'}</div>
        ${c.client.business&&c.client.name?`<div class="inv-muted">${esc(c.client.name)}</div>`:''}
        ${c.client.address?`<div class="inv-muted">${nl2br(c.client.address)}</div>`:''}
        ${c.client.email?`<div class="inv-muted">${esc(c.client.email)}</div>`:''}
      </div>
      <table class="inv-items">
        <thead><tr><th>Description</th><th class="num">Qty</th><th class="num">Unit price</th><th class="num">Amount</th></tr></thead>
        <tbody>
          ${items.length?items.map(it=>`<tr>
            <td>${esc(it.description)}</td>
            <td class="num">${it.qty||0}</td>
            <td class="num">${fmt(it.unitPrice)}</td>
            <td class="num">${fmt((it.qty||0)*(it.unitPrice||0))}</td>
          </tr>`).join(''):`<tr><td colspan="4" style="color:#9ca3af">No line items yet</td></tr>`}
        </tbody>
      </table>
      <div class="inv-totals">
        <div class="inv-trow"><span>Subtotal</span><span>${fmt(t.subtotal)}</span></div>
        ${t.deposit?`<div class="inv-trow"><span>Less deposit paid</span><span>&minus;${fmt(t.deposit)}</span></div>`:''}
        <div class="inv-trow inv-due"><span>${t.deposit?'Balance due':'Total due'}</span><span>${fmt(t.balance)}</span></div>
      </div>
      ${(p.accountName||p.bsb||p.account||p.bank)?`
      <div class="inv-pay">
        <div class="inv-label">Payment details</div>
        <div class="inv-pay-grid">
          ${p.bank?`<div><span>Bank</span>${esc(p.bank)}</div>`:''}
          ${p.accountName?`<div><span>Account name</span>${esc(p.accountName)}</div>`:''}
          ${p.bsb?`<div><span>BSB</span>${esc(p.bsb)}</div>`:''}
          ${p.account?`<div><span>Account number</span>${esc(p.account)}</div>`:''}
        </div>
      </div>`:''}
      ${c.notes?`<div class="inv-notes">${nl2br(c.notes)}</div>`:''}
    </div>`;
}

function renderHistory(){
  const box=$('historyList');
  if(!invoices.length){box.innerHTML='<div class="empty">No saved invoices yet. Fill one in and hit Save.</div>';return;}
  box.innerHTML=invoices.map(inv=>{
    const t=totals(inv);
    return `<div class="hist-item ${current&&current.id===inv.id?'active':''}">
      <div class="hist-main" onclick="loadInvoice(${inv.id})">
        <div class="hist-top"><span class="hist-num">${esc(inv.number)}</span><span class="badge b-${esc(inv.status.toLowerCase())}">${esc(inv.status)}</span></div>
        <div class="hist-client">${esc(inv.client.business||inv.client.name)||'No client'}</div>
        <div class="hist-meta">${fmtDate(inv.issueDate)} &middot; ${fmt(t.balance)}</div>
      </div>
      <div class="hist-actions">
        ${inv.status!=='Paid'?`<button onclick="markPaid(${inv.id})" title="Mark paid">&#10003;</button>`:''}
        <button onclick="duplicateInvoice(${inv.id})" title="Duplicate">&#8862;</button>
        <button onclick="deleteInvoice(${inv.id})" title="Delete">&#128465;</button>
      </div>
    </div>`;
  }).join('');
}

/* ---- settings ---- */
function openSettings(){
  draft={
    business:Object.assign({},business),
    payment:Object.assign({},payment),
    settings:Object.assign({},settings),
    presets:presets.map(p=>Object.assign({},p))
  };
  renderSettings();
  $('settingsModal').classList.add('open');
}
function closeSettings(){$('settingsModal').classList.remove('open');draft=null;}
function saveSettings(){
  business=draft.business;LS.set('vinv_business',business);
  payment=draft.payment;LS.set('vinv_payment',payment);
  settings=draft.settings;LS.set('vinv_settings',settings);
  presets=draft.presets.filter(p=>p.description.trim()!=='');LS.set('vinv_presets',presets);
  closeSettings();
  renderEditor();renderPreview();
  flash('Settings saved');
}
function onLogo(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{draft.business.logo=e.target.result;renderSettings();};
  r.readAsDataURL(f);
}
function renderSettings(){
  const d=draft;
  $('settingsBody').innerHTML=`
    <div class="card-title">Your business</div>
    <div class="grid2">
      <label>Business name<input value="${esc(d.business.name)}" oninput="draft.business.name=this.value"></label>
      <label>ABN (optional)<input value="${esc(d.business.abn)}" oninput="draft.business.abn=this.value"></label>
      <label>Email<input value="${esc(d.business.email)}" oninput="draft.business.email=this.value"></label>
      <label>Phone<input value="${esc(d.business.phone)}" oninput="draft.business.phone=this.value"></label>
      <label class="span2">Address<textarea rows="2" oninput="draft.business.address=this.value">${esc(d.business.address)}</textarea></label>
    </div>
    <label class="span2">Logo
      <div class="logo-row">
        <div class="logo-prev">${d.business.logo?`<img src="${d.business.logo}" alt="">`:'<span>No logo</span>'}</div>
        <input type="file" accept="image/*" onchange="onLogo(this)" style="border:none;padding:0">
        ${d.business.logo?`<button class="btn-ghost" onclick="draft.business.logo='';renderSettings()">Remove</button>`:''}
      </div>
    </label>
    <div class="card-title" style="margin-top:8px">Payment details</div>
    <div class="grid2">
      <label>Account name<input value="${esc(d.payment.accountName)}" oninput="draft.payment.accountName=this.value"></label>
      <label>Bank<input value="${esc(d.payment.bank)}" oninput="draft.payment.bank=this.value"></label>
      <label>BSB<input value="${esc(d.payment.bsb)}" oninput="draft.payment.bsb=this.value"></label>
      <label>Account number<input value="${esc(d.payment.account)}" oninput="draft.payment.account=this.value"></label>
    </div>
    <div class="card-title" style="margin-top:8px">Defaults</div>
    <div class="grid2">
      <label>Invoice number prefix<input value="${esc(d.settings.prefix)}" oninput="draft.settings.prefix=this.value"></label>
      <label>Next invoice number<input type="number" min="1" value="${d.settings.nextNumber}" oninput="draft.settings.nextNumber=parseInt(this.value)||1"></label>
      <label>Payment due (days)<input type="number" min="0" value="${d.settings.dueDays}" oninput="draft.settings.dueDays=parseInt(this.value)||0"></label>
      <label class="span2">Default notes / terms<textarea rows="2" oninput="draft.settings.defaultNotes=this.value">${esc(d.settings.defaultNotes)}</textarea></label>
    </div>
    <div class="card-title" style="margin-top:8px">Saved services <span style="text-transform:none;font-weight:400">— quick-add presets for line items</span></div>
    <div id="presetEdit">${d.presets.map((p,i)=>`
      <div class="preset-row">
        <input placeholder="Service description" value="${esc(p.description)}" oninput="draft.presets[${i}].description=this.value">
        <input type="number" min="0" step="0.01" value="${p.unitPrice}" oninput="draft.presets[${i}].unitPrice=parseFloat(this.value)||0">
        <button class="it-del" onclick="draft.presets.splice(${i},1);renderSettings()" title="Remove">&times;</button>
      </div>`).join('')}</div>
    <button class="btn-ghost" onclick="draft.presets.push({description:'',unitPrice:0});renderSettings()">+ Add service</button>`;
}

function flash(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ---- init ---- */
current=blankInvoice();isNew=true;
renderAll();
</script>
</body>
</html>
