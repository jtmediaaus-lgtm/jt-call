<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JT Invoice — Catalog</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#eef0f3;--card:#fff;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;
  --accent:#4f46e5;--accent-d:#4338ca;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}

/* topbar — matches generator */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#111827;color:#fff}
.brand{font-weight:700;font-size:16px;letter-spacing:.4px}
.brand .dim{opacity:.55;font-weight:500}
.nav{display:flex;gap:8px}
.nav a{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none}
.nav a:hover{background:rgba(255,255,255,.18)}
.nav a.active{background:var(--accent);border-color:var(--accent)}

/* page */
.page{max-width:1180px;margin:0 auto;padding:28px 24px 60px}

/* hero */
.hero{margin-bottom:22px}
.hero h1{font-size:26px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.hero p{font-size:13.5px;color:var(--muted)}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.stat-l{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:6px}
.stat-v{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.4px}
.stat-s{font-size:11.5px;color:var(--muted);margin-top:2px}

/* filter bar */
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filters input,.filters select{font-family:inherit;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 11px;outline:none}
.filters input:focus,.filters select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.filters input.search{flex:1;min-width:200px}
.filters select{min-width:160px}
.results-meta{font-size:12px;color:var(--muted);margin-left:auto;align-self:center}

/* invoice grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.inv-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 18px 16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:border-color .1s,box-shadow .1s,transform .1s;text-align:left;font-family:inherit;color:inherit;font-size:inherit;width:100%}
.inv-card:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(79,70,229,.10);transform:translateY(-1px)}
.inv-card:focus-visible{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(79,70,229,.25),0 4px 14px rgba(79,70,229,.10);transform:translateY(-1px)}
.inv-card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.inv-card .client{font-weight:700;font-size:15px;line-height:1.3;color:var(--ink)}
.inv-card .when{font-size:11.5px;color:var(--muted);margin-top:3px}
.inv-card .pill{background:#eef2ff;color:var(--accent-d);font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.inv-card .lines{font-size:12.5px;color:var(--muted);line-height:1.55;border-top:1px solid var(--line);padding-top:10px;margin-top:2px}
.inv-card .lines .ln{display:flex;justify-content:space-between;gap:8px}
.inv-card .lines .ln + .ln{margin-top:3px}
.inv-card .total-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:auto;padding-top:8px;border-top:1px dashed var(--line)}
.inv-card .total-row .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
.inv-card .total-row .amt{font-size:20px;font-weight:700;letter-spacing:-.3px}

/* empty */
.empty{background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:42px 22px;text-align:center;color:var(--muted);font-size:13.5px}

/* modal */
.modal{display:none;position:fixed;inset:0;background:rgba(17,24,39,.55);z-index:50;align-items:flex-start;justify-content:center;padding:30px 20px;overflow-y:auto}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:820px;overflow:hidden;display:flex;flex-direction:column}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}
.modal-head .h-l{font-weight:700;font-size:14px;color:var(--ink)}
.modal-head .h-r{display:flex;gap:8px;align-items:center}
.modal-head .h-r button{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 13px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:600;font-family:inherit}
.modal-head .h-r button:hover{background:#f3f4f6}
.modal-head .h-r .primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-head .h-r .primary:hover{background:var(--accent-d)}
.modal-head .x{border:none;background:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px}
.modal-body{padding:20px;background:#dde0e6;max-height:78vh;overflow-y:auto}

/* invoice document — matches the generator's preview */
.inv-doc{background:#fff;max-width:760px;margin:0 auto;padding:48px 52px;box-shadow:0 2px 10px rgba(0,0,0,.14);border-radius:4px;color:#000;font-family:Arial,Helvetica,sans-serif}
.doc-title{text-align:center;font-size:26px;font-weight:700;margin-bottom:6px}
.biz-block{text-align:right;font-size:12.5px;line-height:1.5;margin-bottom:26px}
.biz-block .biz-name{font-weight:700;font-size:13.5px}
.inv-to{font-size:13px;line-height:1.6;margin-bottom:34px}
.inv-no{font-size:13px;margin-bottom:8px}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:30px}
.inv-table th,.inv-table td{border:1px solid #000;padding:9px 12px;font-size:12.5px}
.inv-table th{font-weight:700;text-align:left}
.inv-table th.c,.inv-table td.c{text-align:center}
.inv-table td.desc{text-align:left}
.inv-table .totals-label{text-align:right;font-weight:700;line-height:1.7;padding:12px}
.inv-table .totals-amt{text-align:center;font-weight:700;vertical-align:top}
.pay-sec{margin-bottom:18px}
.pay-sec .sec-h{font-weight:700;font-size:14px;margin-bottom:6px}
.pay-sec .sec-b{font-size:13px;line-height:1.6}

/* print: only the invoice doc */
@media print{
  body *{visibility:hidden}
  .modal,.modal-body,.modal-body *{visibility:visible}
  .modal{position:absolute;inset:0;background:#fff;padding:0;overflow:visible}
  .modal-box{box-shadow:none;border-radius:0;max-width:none}
  .modal-head{display:none}
  .modal-body{background:#fff;padding:0;max-height:none;overflow:visible}
  .inv-doc{box-shadow:none;max-width:none;padding:30px 40px}
}

/* mobile */
@media (max-width:720px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .page{padding:18px 14px 40px}
  .hero h1{font-size:22px}
  .filters{flex-direction:column}
  .filters .results-meta{margin-left:0}
  .modal{padding:0}
  .modal-box{border-radius:0;min-height:100vh}
  .inv-doc{padding:28px 22px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">JT INVOICE</div>
  <nav class="nav">
    <a href="catalog.html" class="active">Catalog</a>
    <a href="index.html">Generator</a>
  </nav>
</div>

<div class="page">
  <div class="hero">
    <h1>Invoice Catalog</h1>
    <p>An archive of past work. Filter, search, open, and reprint.</p>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <input class="search" id="q" type="text" placeholder="Search by client, item, invoice…" />
    <select id="clientFilter"><option value="">All clients</option></select>
    <select id="yearFilter"><option value="">All years</option></select>
    <div class="results-meta" id="resultsMeta"></div>
  </div>

  <div id="grid" class="grid"></div>
</div>

<div class="modal" id="viewModal" onclick="if(event.target===this)closeView()">
  <div class="modal-box">
    <div class="modal-head">
      <div class="h-l" id="viewTitle"></div>
      <div class="h-r">
        <button onclick="window.print()">Print / PDF</button>
        <button class="primary" onclick="reuseInGenerator()">Use as new invoice</button>
        <button class="x" onclick="closeView()" aria-label="Close">&times;</button>
      </div>
    </div>
    <div class="modal-body" id="viewBody"></div>
  </div>
</div>

<script>
/* ---- past invoices (extracted from supplied files) ---- */
const PAST = [
  {
    inv:'001', date:'2026-01-01', client:'JoYo Community Events',
    toLines:['ABN: 19 658 105 438','Admin@joyoevents.com.au'],
    items:[{description:'Joyo Trail Ads',qty:2,unitPrice:500}]
  },
  {
    inv:null, date:'2026-03-17', client:'Punchee Media',
    toLines:['Morgan Clark'],
    items:[{description:'Elite tune videos',qty:4,unitPrice:250}]
  },
  {
    inv:null, date:'2026-03-18', client:'Punchee Media',
    toLines:['Morgan Clark'],
    items:[{description:'Footy player Elite tune video',qty:1,unitPrice:250}]
  },
  {
    inv:null, date:'2026-03-24', client:'BEVIN Creative',
    toLines:['Benjamin Bott','ABN: 13 313 521 400','Unit 98, 33 Newcastle Street','Perth, WA 6000'],
    items:[{description:'Shooting of movie night social event',qty:2,unitPrice:125}]
  },
  {
    inv:null, date:'2026-03-24', client:'Punchee Media',
    toLines:['Morgan Clark'],
    items:[{description:'Deisel tuning video Elite tune',qty:1,unitPrice:250}]
  },
  {
    inv:null, date:'2026-04-02', client:'Mandurah Combat Sports Academy',
    toLines:[],
    items:[
      {description:'Week 1',qty:3,unitPrice:125},
      {description:'Week 2',qty:3,unitPrice:125},
      {description:'Week 3',qty:4,unitPrice:125},
      {description:'Week 4',qty:3,unitPrice:125}
    ]
  },
  {
    inv:null, date:'2026-04-08', client:'JoYo Community Events',
    toLines:[],
    items:[{description:'Joyo Trail Ads',qty:2,unitPrice:500}]
  },
  {
    inv:null, date:'2026-04-30', client:'beagl pty ltd', dateApprox:true,
    toLines:[],
    items:[{description:'Photo day sizzle reel and B-Roll',qty:1,unitPrice:500}]
  },
  {
    inv:'002', date:'2026-04-19', client:'Bright Tsar Studios Pty Ltd',
    toLines:['ABN: 28 672 517 814'],
    items:[{description:'Shooting B-roll for Dentist Client',qty:3,unitPrice:100}]
  },
  {
    inv:'001', date:'2026-05-06', client:'PRP Global Pty Ltd',
    toLines:['ABN: 93 675 137 694'],
    items:[
      {description:'Shooting for PRP fight week (Days)',qty:5,unitPrice:300},
      {description:'PRP rashes try on shoot (Hours)',qty:2,unitPrice:100}
    ]
  },
  {
    inv:'006', date:'2026-05-06', client:'Punchee Media Pty Ltd',
    toLines:['Morgan Clark','ABN: 76 674 689 715'],
    items:[{description:'HGT promotional video',qty:1,unitPrice:800}]
  }
];

/* business identity — matches the generator's defaults */
const BIZ = {
  name:'JT Media Aus',
  abn:'71 471 928 133',
  phone:'0413 023 219',
  email:'jtmediaaus@gmail.com',
  payee:'Jack Templeman',
  bsb:'086 245',
  acc:'87 1428 196'
};
const DEFAULT_TERMS = 'Payment within 14 days from the date of this invoice. Pay via bank transfer to the account above.';

/* ---- utils ---- */
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const fmt = n => '$'+(n%1===0?String(n):n.toFixed(2));
const total = inv => inv.items.reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.unitPrice)||0),0);
function fmtDate(s, approx){
  if(!s) return '';
  const [y,m,d]=s.split('-').map(Number);
  if(!y) return s;
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(approx) return mo[m-1]+' '+y;
  return d+' '+mo[m-1]+' '+y;
}
function fmtDateLong(s, approx){
  if(!s) return '';
  const [y,m,d]=s.split('-').map(Number);
  if(!y) return s;
  const mo=['January','February','March','April','May','June','July','August','September','October','November','December'];
  if(approx) return mo[m-1]+' '+y;
  const su = d%10===1&&d!==11?'st':d%10===2&&d!==12?'nd':d%10===3&&d!==13?'rd':'th';
  return d+su+' '+mo[m-1]+' '+y;
}
const year = s => (s||'').slice(0,4);

/* ---- state + render ---- */
PAST.sort((a,b)=>(b.date||'').localeCompare(a.date||''));

function renderStats(){
  const totalBilled = PAST.reduce((s,p)=>s+total(p),0);
  const clients = new Set(PAST.map(p=>p.client));
  const biggest = PAST.reduce((m,p)=>Math.max(m,total(p)),0);
  $('stats').innerHTML = [
    {l:'Invoices',v:PAST.length,s:'on record'},
    {l:'Total billed',v:fmt(totalBilled),s:'across all clients'},
    {l:'Unique clients',v:clients.size,s:[...clients].slice(0,3).join(' · ')+(clients.size>3?'…':'')},
    {l:'Biggest job',v:fmt(biggest),s:''}
  ].map(s=>`<div class="stat"><div class="stat-l">${s.l}</div><div class="stat-v">${s.v}</div><div class="stat-s">${esc(s.s)}</div></div>`).join('');
}

function renderFilters(){
  const clients = [...new Set(PAST.map(p=>p.client))].sort();
  $('clientFilter').innerHTML = '<option value="">All clients</option>' +
    clients.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  const years = [...new Set(PAST.map(p=>year(p.date)).filter(Boolean))].sort().reverse();
  $('yearFilter').innerHTML = '<option value="">All years</option>' +
    years.map(y=>`<option value="${y}">${y}</option>`).join('');
}

function applyFilters(){
  const q = $('q').value.trim().toLowerCase();
  const cf = $('clientFilter').value;
  const yf = $('yearFilter').value;
  return PAST.filter(p=>{
    if(cf && p.client!==cf) return false;
    if(yf && year(p.date)!==yf) return false;
    if(!q) return true;
    const hay = [p.client, p.inv||'', ...(p.toLines||[]), ...p.items.map(i=>i.description)].join(' ').toLowerCase();
    return hay.includes(q);
  });
}

function renderGrid(){
  const list = applyFilters();
  $('resultsMeta').textContent = list.length + (list.length===1?' invoice':' invoices');
  const g = $('grid');
  if(!list.length){
    g.outerHTML = '<div class="empty" id="grid">No invoices match those filters.</div>';
    return;
  }
  // make sure id="grid" is preserved as a grid container after empty replacement
  if(g.classList.contains('empty')){
    const replacement = document.createElement('div');
    replacement.id='grid'; replacement.className='grid';
    g.replaceWith(replacement);
  }
  $('grid').innerHTML = list.map((p,idx)=>{
    const t = total(p);
    const itemSummary = p.items.map(i=>`<div class="ln"><span>${i.qty}× ${esc(i.description)}</span><span>${fmt(i.qty*i.unitPrice)}</span></div>`).join('');
    const idx = PAST.indexOf(p);
    return `<div class="inv-card" role="button" tabindex="0" aria-label="Open invoice for ${esc(p.client)}, ${fmtDate(p.date,p.dateApprox)}, total ${fmt(t)}" onclick="openView(${idx})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openView(${idx})}">
      <div class="top">
        <div>
          <div class="client">${esc(p.client)}</div>
          <div class="when">${fmtDate(p.date,p.dateApprox)}${p.inv?' · Invoice '+esc(p.inv):''}</div>
        </div>
        ${p.inv?'<div class="pill">Inv '+esc(p.inv)+'</div>':''}
      </div>
      <div class="lines">${itemSummary}</div>
      <div class="total-row">
        <div class="lbl">Total</div>
        <div class="amt">${fmt(t)}</div>
      </div>
    </div>`;
  }).join('');
}

/* ---- modal: render the invoice in the generator's preview style ---- */
let viewing = null;
function openView(idx){
  viewing = PAST[idx];
  const p = viewing;
  $('viewTitle').textContent = p.client + ' · ' + fmtDate(p.date,p.dateApprox);
  const t = total(p);
  const toBlock = (p.toLines||[]).map(l=>`<div>${esc(l)}</div>`).join('');
  const rows = p.items.map(it=>`
    <tr>
      <td class="desc">${esc(it.description)}</td>
      <td class="c">${esc(it.qty)}</td>
      <td class="c">${fmt(it.unitPrice)}</td>
      <td class="c">${fmt(it.qty*it.unitPrice)}</td>
    </tr>`).join('');
  $('viewBody').innerHTML = `
    <div class="inv-doc">
      <div class="biz-block">
        <div class="biz-name">${esc(BIZ.name)}</div>
        <div>ABN: ${esc(BIZ.abn)}</div>
        <div>Phone: ${esc(BIZ.phone)}</div>
        <div>Email: ${esc(BIZ.email)}</div>
      </div>
      <div class="doc-title">Invoice${p.inv?' &nbsp;'+esc(p.inv):''}</div>
      <div class="inv-to">
        <div><strong>To:</strong> ${esc(p.client)}</div>
        ${toBlock}
        <div style="margin-top:8px"><strong>Date:</strong> ${fmtDateLong(p.date,p.dateApprox)}</div>
      </div>
      <table class="inv-table">
        <thead>
          <tr>
            <th>Item description</th>
            <th class="c" style="width:90px">Qty</th>
            <th class="c" style="width:130px">Unit price</th>
            <th class="c" style="width:130px">Amount</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
          <tr>
            <td class="totals-label" colspan="3">Total amount payable<br><span style="font-weight:400;font-size:11.5px">No GST has been charged</span></td>
            <td class="totals-amt">${fmt(t)}</td>
          </tr>
        </tbody>
      </table>
      <div class="pay-sec">
        <div class="sec-h">Payment details</div>
        <div class="sec-b">
          Pay by bank transfer to:<br>
          Name: ${esc(BIZ.payee)}<br>
          BSB: ${esc(BIZ.bsb)}<br>
          Acc #: ${esc(BIZ.acc)}
        </div>
      </div>
      <div class="pay-sec">
        <div class="sec-h">Payment terms</div>
        <div class="sec-b">${esc(DEFAULT_TERMS)}</div>
      </div>
    </div>
  `;
  $('viewModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeView(){
  $('viewModal').classList.remove('open');
  document.body.style.overflow='';
  viewing = null;
}
function reuseInGenerator(){
  if(!viewing) return;
  try{
    sessionStorage.setItem('vinv_seed', JSON.stringify({
      to: viewing.client,
      items: viewing.items.map(it=>({description:it.description,qty:it.qty,unitPrice:it.unitPrice}))
    }));
  }catch(e){}
  location.href = 'index.html?seed=1';
}

/* ---- wire up ---- */
$('q').addEventListener('input',renderGrid);
$('clientFilter').addEventListener('change',renderGrid);
$('yearFilter').addEventListener('change',renderGrid);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeView();});

renderStats();
renderFilters();
renderGrid();
</script>
</body>
</html>
